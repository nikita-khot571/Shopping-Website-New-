<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shopping Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4">🛒 Shopping Website</h1>

    <div id="products" class="row g-3"></div>

    <hr class="my-4" />
    

    <h4>Add product</h4>
    <form id="addForm" class="row g-2">
      <div class="col-md-5">
        <input id="name" class="form-control" placeholder="Name" required />
      </div>
      <div class="col-md-3">
        <input id="price" type="number" step="0.01" class="form-control" placeholder="Price" required />
      </div>
      <div class="col-md-4">
        <input id="description" class="form-control" placeholder="Description" />
      </div>
      <div class="col-12">
        <button class="btn btn-primary mt-2" type="submit">Add Product</button>
      </div>
    </form>
  </div>

  <script>
    const GRAPHQL_URL = "http://localhost:4000/"; // Apollo standalone default

    async function fetchProducts() {
      const res = await fetch(GRAPHQL_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: `query { products { id name price description } }` })
      });
      const json = await res.json();
      return json.data?.products ?? [];
    }

    function renderProducts(products){
      const container = document.getElementById("products");
      if (!products.length) {
        container.innerHTML = '<div class="col-12"><div class="alert alert-info">No products yet.</div></div>';
        return;
      }
      container.innerHTML = products.map(p => `
        <div class="col-md-4">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">${p.name}</h5>
              <p class="card-text">${p.description ?? ''}</p>
            </div>
            <div class="card-footer">
              <strong>$${p.price}</strong>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function loadAndRender(){
      const products = await fetchProducts();
      renderProducts(products);
    }

    document.getElementById("addForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value.trim();
      const price = parseFloat(document.getElementById("price").value);
      const description = document.getElementById("description").value.trim();

      const mutation = `mutation ($name: String!, $price: Float!, $description: String) {
        addProduct(name: $name, price: $price, description: $description) { id name price description }
      }`;

      const res = await fetch(GRAPHQL_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: mutation, variables: { name, price, description } })
      });

      const json = await res.json();
      document.getElementById("addForm").reset();
      loadAndRender();
    });

    // initial load
    loadAndRender();
  </script>
</body>
</html>
